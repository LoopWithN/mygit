<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> MY Portfolio</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: 'Segoe UI', sans-serif;
        overflow-x: hidden;
    }

    :root {
        --bmw-blue: #00aaff;
    }

    /* HEADLIGHT SWEEP */
    .light {
        position: fixed;
        top: 0;
        left: -100%;
        width: 200%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(0,170,255,0.2), transparent);
        animation: sweep 6s infinite;
        z-index: 0;
    }

    @keyframes sweep {
        0% { left: -100%; }
        100% { left: 100%; }
    }

    header {
        text-align: center;
        padding: 60px;
        border-bottom: 2px solid var(--bmw-blue);
        position: relative;
        z-index: 1;
    }

    h1 {
        font-size: 48px;
        letter-spacing: 3px;
    }

    .tagline {
        color: #aaa;
    }

    section {
        max-width: 1000px;
        margin: auto;
        padding: 50px 20px;
        position: relative;
        z-index: 1;
    }

    h2 {
        color: var(--bmw-blue);
        border-left: 4px solid var(--bmw-blue);
        padding-left: 10px;
    }

    .card {
        background: #111;
        padding: 20px;
        margin: 20px 0;
        border-radius: 10px;
        transition: 0.3s;
    }

    .card:hover {
        box-shadow: 0 0 20px var(--bmw-blue);
    }

    /* SPEEDOMETER */
    .meter {
        width: 150px;
        height: 150px;
        border: 6px solid #222;
        border-top: 6px solid var(--bmw-blue);
        border-radius: 50%;
        position: relative;
        margin: 20px;
        display: inline-block;
        animation: rotateMeter 2s ease-out forwards;
    }

    .meter span {
        position: absolute;
        width: 4px;
        height: 50px;
        background: var(--bmw-blue);
        top: 25px;
        left: 50%;
        transform-origin: bottom;
    }

    .meter-label {
        text-align: center;
        margin-top: 10px;
    }

    @keyframes rotateMeter {
        from { transform: rotate(0deg); }
        to { transform: rotate(220deg); }
    }

    footer {
        text-align: center;
        padding: 20px;
        border-top: 1px solid #222;
    }
</style>
</head>

<body>

<div class="light"></div>

<header>
    <h1>SIDDHARDHA</h1>
    <p class="tagline">Drive Your Future 🚀</p>
</header>

<section>
    <h2>About Me</h2>
    <div class="card">
        <p>
            Inspired by BMW precision engineering, I build fast, efficient, and scalable solutions.
        </p>
    </div>
</section>

<section>
    <h2>Skills (Speed Meter)</h2>
    
    <div class="meter">
        <span style="transform: rotate(200deg);"></span>
    </div>
    <div class="meter-label">Python</div>

    <div class="meter">
        <span style="transform: rotate(180deg);"></span>
    </div>
    <div class="meter-label">Web Dev</div>

    <div class="meter">
        <span style="transform: rotate(150deg);"></span>
    </div>
    <div class="meter-label">AWS</div>

</section>

<section>
    <h2>Interests</h2>
    <div class="card">
        <ul>
            <li>🚗 Automotive Tech</li>
            <li>💻 Development</li>
            <li>🔌 Electronics</li>
            <li>☁ Cloud</li>
        </ul>
    </div>
</section>

<footer>
    <p>© 2026 SIDDHARDHA | BMW Performance UI</p>
</footer>

</body>
</html>
